version: '3.8'

services:
  # FastAPI Backend
  api:
    build: .
    container_name: xray-api
    ports:
      - "8000:8000"
    volumes:
      - ./experiments:/app/experiments
      - ./configs:/app/configs
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # Streamlit Frontend
  frontend:
    build: .
    container_name: xray-frontend
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run frontend/app.py
              --server.port 8501
              --server.address 0.0.0.0
              --server.headless true
    depends_on:
      - api
    restart: unless-stopped
